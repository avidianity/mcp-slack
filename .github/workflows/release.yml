name: Release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  check:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - run: bun run check

  compile:
    name: Compile Binaries
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - target: bun-linux-x64
            artifact: mcp-slack-linux-x64
          - target: bun-darwin-arm64
            artifact: mcp-slack-macos-arm64
          - target: bun-darwin-x64
            artifact: mcp-slack-macos-x64
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - run: bun install --frozen-lockfile

      - name: Compile for ${{ matrix.target }}
        run: bun build src/index.ts --compile --target=${{ matrix.target }} --outfile dist/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    name: Create Release
    needs: compile
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Check if release already exists
        id: check_release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/download-artifact@v8
        if: steps.check_release.outputs.exists == 'false'
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/mcp-slack-linux-x64
            artifacts/mcp-slack-macos-arm64
            artifacts/mcp-slack-macos-x64

  publish:
    name: Publish to npm
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - name: Check if version is already published
        id: check_npm
        run: |
          PKG_NAME=$(jq -r .name package.json)
          PKG_VERSION=$(jq -r .version package.json)
          if npm view "${PKG_NAME}@${PKG_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - run: bun install --frozen-lockfile
        if: steps.check_npm.outputs.exists == 'false'

      - run: npm publish --access public
        if: steps.check_npm.outputs.exists == 'false'
